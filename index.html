<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InfraReport - Red Comunitaria 20</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-white text-slate-900 font-sans min-h-screen">

    <nav class="bg-slate-900 text-white shadow-md sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-4 py-3 flex justify-between items-center">
            <span class="font-extrabold text-xl tracking-wider">Infra<span class="text-slate-400">Report</span></span>
            <span id="syncStatus" class="text-[10px] bg-slate-800 px-2 py-1 rounded">Sincronizando...</span>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto px-4 py-8 grid grid-cols-1 md:grid-cols-2 gap-8">
        <section class="bg-slate-50 p-6 rounded-2xl border border-slate-200 self-start">
            <h2 class="font-bold mb-4">Nuevo Reporte</h2>
            <form id="reportForm" class="space-y-3">
                <input type="text" id="title" required placeholder="Daño" class="w-full p-2 border rounded-lg text-sm">
                <textarea id="description" required placeholder="Detalles..." rows="2" class="w-full p-2 border rounded-lg text-sm"></textarea>
                <input type="file" id="imageInput" accept="image/*" required class="w-full text-sm">
                <button type="submit" id="btnSubmit" class="w-full bg-slate-900 text-white py-2 rounded-lg text-sm font-bold">Publicar para todos</button>
            </form>
        </section>

        <section>
            <h2 class="font-bold mb-4">Feed Comunitario</h2>
            <div id="reportsContainer" class="space-y-4"></div>
        </section>
    </main>

    <script>
        const API_URL = "https://api.npoint.io/c3d8a4f6be59247c1a2e"; // Tu canal exclusivo
        let reportsList = [];
        let isProcessing = false;

        async function syncData(actionFn = null) {
            if (isProcessing) return;
            isProcessing = true;
            document.getElementById('syncStatus').textContent = "Sincronizando...";
            
            try {
                const res = await fetch(`${API_URL}?nocache=${Date.now()}`);
                reportsList = await res.json();
                if (actionFn) {
                    reportsList = actionFn(reportsList);
                    await fetch(API_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(reportsList)
                    });
                }
                render();
            } catch (e) { console.error(e); }
            
            isProcessing = false;
            document.getElementById('syncStatus').textContent = "Al día";
        }

        function render() {
            const container = document.getElementById('reportsContainer');
            container.innerHTML = reportsList.map(r => `
                <div class="border rounded-xl p-4 shadow-sm bg-white">
                    <img src="${r.image}" class="w-full h-32 object-cover rounded-lg mb-2">
                    <h3 class="font-bold text-sm">${r.title}</h3>
                    <p class="text-xs text-slate-600">${r.description}</p>
                </div>
            `).join('');
        }

        document.getElementById('reportForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnSubmit');
            btn.disabled = true;
            
            const file = document.getElementById('imageInput').files[0];
            const reader = new FileReader();
            reader.onload = async (event) => {
                const img = new Image();
                img.onload = async () => {
                    const canvas = document.createElement('canvas');
                    canvas.width = 300; canvas.height = 200;
                    canvas.getContext('2d').drawImage(img, 0, 0, 300, 200);
                    const base64 = canvas.toDataURL('image/jpeg', 0.2);

                    await syncData((list) => {
                        list.unshift({
                            id: Date.now(),
                            title: document.getElementById('title').value,
                            description: document.getElementById('description').value,
                            image: base64
                        });
                        return list.slice(0, 20); // Mantenemos el límite para que nunca falle
                    });
                    btn.disabled = false;
                    document.getElementById('reportForm').reset();
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        });

        setInterval(() => syncData(), 5000);
        syncData();
    </script>
</body>
</html>
